<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>탑뱅커 · 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0c;--panel:#111114;--panel2:#16161a;--line:#ffffff14;--line2:#ffffff0d;--tx:#ededf0;--mut:#8a8a92;
    --ig:linear-gradient(45deg,#feda75 0%,#fa7e1e 25%,#d62976 55%,#962fbf 78%,#4f5bd5 100%);
    --char:url('/character.png');}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--tx);font-family:'Inter',-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;-webkit-font-smoothing:antialiased;line-height:1.6;}
  a{text-decoration:none;color:inherit;}
  .wrap{max-width:900px;margin:0 auto;padding:18px 24px 80px;}
  .igtext{background:var(--ig);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .nav{display:flex;align-items:center;justify-content:space-between;padding:12px 0;}
  .brand{font-size:15px;letter-spacing:4px;font-weight:800;color:#fff;}
  .right{display:flex;align-items:center;gap:11px;}
  .gobtn{font-size:13px;font-weight:700;color:#fff;background:var(--ig);border-radius:11px;padding:9px 16px;}
  .chip{display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--line);border-radius:22px;padding:5px 13px 5px 6px;font-size:12.5px;color:#d6d6db;}
  .chip .r{width:26px;height:26px;border-radius:50%;background:var(--ig);padding:2px;}
  .chip .r img,.chip .r i{width:100%;height:100%;border-radius:50%;background:#111;display:block;object-fit:cover;}
  .chip .hd{font-weight:600;color:#fff;}
  .hero{position:relative;margin-top:14px;border-radius:22px;overflow:hidden;border:1px solid var(--line);min-height:250px;
    background:radial-gradient(600px 300px at 88% 20%,#d6297655,transparent 60%),radial-gradient(520px 320px at 70% 110%,#4f5bd544,transparent 60%),radial-gradient(400px 260px at 96% 70%,#fa7e1e44,transparent 60%),#0b0b10;}
  .hero .in{position:relative;z-index:3;padding:38px 36px;max-width:66%;}
  .badge{display:inline-flex;align-items:center;gap:8px;font-size:12px;color:#fff;background:#ffffff12;border:1px solid #ffffff22;padding:7px 14px;border-radius:20px;}
  .badge .g{width:16px;height:16px;border-radius:5px;background:var(--ig);}
  .hero h1{font-size:34px;font-weight:800;letter-spacing:-1px;color:#fff;margin:15px 0 8px;line-height:1.14;}
  .hero p{color:#c4c4cc;font-size:14.5px;max-width:380px;}
  .cta{margin-top:22px;display:inline-flex;align-items:center;gap:9px;background:var(--ig);color:#fff;font-weight:700;border-radius:13px;padding:14px 24px;font-size:15px;box-shadow:0 12px 34px #d6297644;}
  .hero .char{position:absolute;right:16px;bottom:0;height:250px;z-index:2;background:var(--char) no-repeat bottom/contain;filter:drop-shadow(0 8px 26px #00000088);}
  .stories{display:flex;gap:20px;margin:26px 2px 6px;overflow:auto;padding-bottom:6px;}
  .story{display:flex;flex-direction:column;align-items:center;gap:8px;flex:none;width:76px;cursor:pointer;}
  .story .ring{width:66px;height:66px;border-radius:50%;padding:3px;background:var(--ig);}
  .story .ring .ic{width:100%;height:100%;border-radius:50%;background:#101014;display:flex;align-items:center;justify-content:center;font-size:24px;border:2px solid #0a0a0c;}
  .story.add .ring{background:#2a2a30;}
  .story .lbl{font-size:11.5px;color:#c4c4cc;text-align:center;line-height:1.25;}
  .pstats{display:flex;gap:34px;margin:22px 4px 8px;padding:16px 4px;border-top:1px solid var(--line2);border-bottom:1px solid var(--line2);}
  .pstat b{font-size:20px;font-weight:800;color:#fff;}
  .pstat span{font-size:12.5px;color:var(--mut);margin-left:6px;}
  .tabs{display:flex;gap:26px;justify-content:center;margin:12px 0 14px;color:var(--mut);font-size:13px;}
  .tabs .on{color:#fff;border-top:2px solid #fff;padding-top:10px;margin-top:-12px;}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
  .cell{position:relative;aspect-ratio:1/1;overflow:hidden;background:#0e0e12;border:1px solid var(--line2);display:block;}
  .cell img{width:100%;height:100%;object-fit:cover;display:block;}
  .cell .type{position:absolute;top:9px;right:10px;font-size:13px;color:#fff;text-shadow:0 1px 3px #000;}
  .cell .ov{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;gap:18px;opacity:0;transition:opacity .15s;color:#fff;font-weight:700;font-size:14px;}
  .cell:hover .ov{opacity:1;}
  .skel{background:linear-gradient(100deg,#141418 30%,#1c1c22 50%,#141418 70%);background-size:200% 100%;animation:sh 1.2s infinite;}
  @keyframes sh{to{background-position:-200% 0;}}
  .note{grid-column:1/-1;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;font-size:13px;color:var(--mut);text-align:center;line-height:1.7;}
  .note a{color:#d6a9ff;}
  .foot{margin-top:26px;color:#5f5f67;font-size:12.5px;text-align:center;line-height:1.8;}
  @media(max-width:640px){.hero .char{opacity:.32;}.hero .in{max-width:100%;}.chip .hd{display:none;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="nav">
    <div class="brand">TOP<span class="igtext">·</span>BANKER</div>
    <div class="right">
      <div class="chip"><span class="r" id="navpic"><i></i></span><span class="hd" id="navuser">@topbanker99</span></div>
      <a class="gobtn" href="/index.html">발행하기 →</a>
    </div>
  </div>

  <div class="hero">
    <div class="in">
      <div class="badge"><span class="g"></span> 인스타그램 자동 발행</div>
      <h1>안녕하세요,<br>오늘도 발행 도와드릴게요</h1>
      <p>이미지 한 번 올리면 피드·릴스·쇼츠까지 한 곳에서.</p>
      <a class="cta" href="/index.html">＋ 새 카드뉴스 만들기</a>
    </div>
    <div class="char"></div>
  </div>

  <div class="stories">
    <a class="story add" href="/index.html"><div class="ring"><div class="ic">＋</div></div><div class="lbl">새 발행</div></a>
    <a class="story" href="/index.html"><div class="ring"><div class="ic">🎞️</div></div><div class="lbl">쇼츠</div></a>
    <a class="story" href="/index.html"><div class="ring"><div class="ic">▶️</div></div><div class="lbl">릴스</div></a>
    <a class="story" href="/index.html"><div class="ring"><div class="ic">📅</div></div><div class="lbl">예약</div></a>
    <a class="story" href="https://www.instagram.com/topbanker99/" target="_blank"><div class="ring"><div class="ic">📷</div></div><div class="lbl">내 프로필</div></a>
  </div>

  <div class="pstats">
    <div class="pstat"><b id="s-media">–</b><span>게시물</span></div>
    <div class="pstat"><b id="s-fol">–</b><span>팔로워</span></div>
    <div class="pstat"><b id="s-folg">–</b><span>팔로잉</span></div>
  </div>

  <div class="tabs"><span class="on">▦ 최근 게시물</span></div>
  <div class="grid" id="grid"></div>

  <div class="foot">
    실제 인스타그램 계정(@topbanker99) 데이터를 실시간으로 불러옵니다 · 5분마다 갱신
  </div>
</div>

<script>
  var fmt = function(n){ if(n==null) return '–'; if(n>=10000) return (n/1000).toFixed(1)+'k'; if(n>=1000) return (n/1000).toFixed(1)+'k'; return String(n); };
  var esc = function(s){ return String(s||'').replace(/</g,'&lt;').replace(/"/g,'&quot;'); };
  var grid = document.getElementById('grid');

  // 로딩 스켈레톤
  var sk=''; for(var i=0;i<6;i++) sk+='<div class="cell skel"></div>'; grid.innerHTML=sk;

  fetch('/api/ig-stats').then(function(r){ return r.json(); }).then(function(d){
    if(!d || !d.ok){ throw new Error((d&&d.error)||'unknown'); }
    // 계정
    document.getElementById('s-media').textContent = fmt(d.mediaCount);
    document.getElementById('s-fol').textContent   = fmt(d.followers);
    document.getElementById('s-folg').textContent  = fmt(d.following);
    if(d.username){ document.getElementById('navuser').textContent = '@'+d.username; }
    if(d.profilePic){ document.getElementById('navpic').innerHTML = '<img src="'+esc(d.profilePic)+'" alt="">'; }

    // 피드
    var posts = d.posts || [];
    if(!posts.length){
      grid.innerHTML = '<div class="note">아직 불러올 게시물이 없거나, 토큰 권한이 부족할 수 있어요.<br>진단: <a href="/api/ig-stats" target="_blank">/api/ig-stats</a> 를 열어 errors 항목을 확인하세요.</div>';
      return;
    }
    var html='';
    posts.forEach(function(p){
      var badge = p.type==='VIDEO' ? '▶' : (p.type==='CAROUSEL_ALBUM' ? '▦' : '');
      var ov = '';
      if(p.likes!=null || p.comments!=null){
        ov = '<div class="ov">'+(p.likes!=null?('♥ '+p.likes.toLocaleString()):'')+(p.comments!=null?('　💬 '+p.comments.toLocaleString()):'')+'</div>';
      }
      var img = p.thumb ? '<img loading="lazy" src="'+esc(p.thumb)+'" alt="">' : '';
      var open = p.permalink ? (' href="'+esc(p.permalink)+'" target="_blank"') : '';
      html += '<a class="cell"'+open+'>'+img+(badge?'<span class="type">'+badge+'</span>':'')+ov+'</a>';
    });
    grid.innerHTML = html;
  }).catch(function(err){
    grid.innerHTML = '<div class="note">데이터를 불러오지 못했습니다 ('+esc(err.message)+').<br>진단: <a href="/api/ig-stats" target="_blank">/api/ig-stats</a> 를 열어 확인하세요. 팔로워/좋아요 읽기 권한(instagram_business_basic)이 토큰에 필요할 수 있습니다.</div>';
  });
</script>
</body>
</html>
